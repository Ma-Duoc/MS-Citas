# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8085

# =========================================================
# SPRING APPLICATION
# =========================================================
spring.application.name=ms-citas

# =========================================================
# H2 DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=jdbc:h2:mem:citasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# =========================================================
# H2 CONSOLE
# =========================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =========================================================
# EXTERNAL MICROSERVICES
# =========================================================
ms.medicos.url=http://localhost:8081
ms.salas.url=http://localhost:8082
ms.pacientes.url=http://localhost:8086

# =========================================================
# RESILIENCE4J - CIRCUIT BREAKER
# =========================================================
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

# Medicos
resilience4j.circuitbreaker.configs.medicos.baseConfig=default
resilience4j.circuitbreaker.configs.medicos.waitDurationInOpenState=15s
resilience4j.circuitbreaker.configs.medicos.failureRateThreshold=40
resilience4j.circuitbreaker.configs.medicos.permittedNumberOfCallsInHalfOpenState=2

# Salas
resilience4j.circuitbreaker.configs.salas.baseConfig=default
resilience4j.circuitbreaker.configs.salas.waitDurationInOpenState=15s
resilience4j.circuitbreaker.configs.salas.failureRateThreshold=40
resilience4j.circuitbreaker.configs.salas.permittedNumberOfCallsInHalfOpenState=2

# Instances
resilience4j.circuitbreaker.instances.medicos.baseConfig=medicos
resilience4j.circuitbreaker.instances.salas.baseConfig=salas

# =========================================================
# RESILIENCE4J - RETRY
# =========================================================
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s
resilience4j.retry.configs.default.retryExceptions[0]=org.springframework.web.client.ResourceAccessException
resilience4j.retry.configs.default.retryExceptions[1]=java.net.SocketTimeoutException
resilience4j.retry.configs.default.retryExceptions[2]=org.springframework.web.client.HttpServerErrorException

# Retry Medicos
resilience4j.retry.configs.medicos.baseConfig=default
resilience4j.retry.configs.medicos.maxAttempts=2
resilience4j.retry.configs.medicos.waitDuration=500ms

# Retry Salas
resilience4j.retry.configs.salas.baseConfig=default
resilience4j.retry.configs.salas.maxAttempts=2
resilience4j.retry.configs.salas.waitDuration=500ms

# Retry Instances
resilience4j.retry.instances.medicos.baseConfig=medicos
resilience4j.retry.instances.salas.baseConfig=salas

# =========================================================
# RESILIENCE4J - TIME LIMITER
# =========================================================
resilience4j.timelimiter.configs.default.timeoutDuration=5s
resilience4j.timelimiter.configs.default.cancelRunningFuture=true

resilience4j.timelimiter.configs.medicos.baseConfig=default
resilience4j.timelimiter.configs.medicos.timeoutDuration=3s

resilience4j.timelimiter.configs.salas.baseConfig=default
resilience4j.timelimiter.configs.salas.timeoutDuration=3s

resilience4j.timelimiter.instances.medicos.baseConfig=medicos
resilience4j.timelimiter.instances.salas.baseConfig=salas

# =========================================================
# LOGGING
# =========================================================
logging.level.com.microservicios.mscitas=DEBUG
logging.level.com.microservicios.mscitas.client=DEBUG
logging.level.com.microservicios.mscitas.service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.io.github.resilience4j=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE