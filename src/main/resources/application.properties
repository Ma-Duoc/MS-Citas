# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8081

# =========================================================
# SPRING APPLICATION
# =========================================================
spring.application.name=ms-citas

# =========================================================
# H2 DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=jdbc:h2:mem:citasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# =========================================================
# H2 CONSOLE
# =========================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =========================================================
# FEIGN CLIENT
# =========================================================
spring.cloud.openfeign.circuitbreaker.enabled=true

# =========================================================
# RESILIENCE4J - CIRCUIT BREAKER
# =========================================================

# ---------- DEFAULT ----------
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true

# ---------- CITAS SERVICE ----------
resilience4j.circuitbreaker.instances.citasService.baseConfig=default

# =========================================================
# RESILIENCE4J - RETRY
# =========================================================

# ---------- DEFAULT ----------
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s

# ---------- CITAS SERVICE ----------
resilience4j.retry.instances.citasService.baseConfig=default

# =========================================================
# FEIGN TIMEOUTS
# =========================================================
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=3000

# =========================================================
# LOGGING
# =========================================================
logging.level.com.microservicios.mscitas=DEBUG
logging.level.com.microservicios.mscitas.client=DEBUG
logging.level.com.microservicios.mscitas.service=DEBUG

logging.level.org.springframework.web=INFO
logging.level.io.github.resilience4j=INFO

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE